<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body
    id="appBody"
    class="text-gray-800 font-sans antialiased min-h-screen selection:bg-pink-500 selection:text-white bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600">
    <div
      class="flex flex-col justify-center items-center min-h-screen gap-8 p-6">
      <div
        class="w-full max-w-md transition-all duration-300 transform hover:-translate-y-1">
        <form
          id="weatherForm"
          action=""
          class="bg-white/80 backdrop-blur-xl p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/50">
          <h1
            class="text-3xl font-extrabold mb-2 text-center text-gray-900 tracking-tight">
            Weather Dashboard
          </h1>
          <p class="text-sm text-gray-600 mb-8 text-center font-medium">
            Enter a city name to get its current weather.
          </p>

          <div class="flex flex-col sm:flex-row gap-4">
            <input
              id="cityInput"
              type="text"
              placeholder="e.g., London, Tokyo"
              class="w-full flex-1 bg-white/90 border border-gray-200 rounded-xl py-3 px-5 focus:outline-none focus:ring-4 focus:ring-indigo-500/30 focus:border-indigo-500 transition-all shadow-sm placeholder:text-gray-400" />
            <button
              id="GetWeatherBtn"
              type="submit"
              class="w-full sm:w-auto bg-indigo-600 text-white font-semibold py-3 px-8 rounded-xl hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/40 focus:outline-none focus:ring-4 focus:ring-indigo-500/50 transition-all active:scale-95">
              Search
            </button>
          </div>

          <div class="flex flex-col sm:flex-row gap-4"></div>

          <div
            class="flex flex-wrap items-center gap-2 mt-4 justify-center sm:justify-start">
            <span
              class="text-xs text-gray-500 font-bold uppercase tracking-wider"
              >Try:</span
            >
            <button
              type="button"
              class="suggestion-btn text-xs bg-white/60 hover:bg-indigo-50 text-indigo-700 font-semibold py-1.5 px-3 rounded-full border border-indigo-100 shadow-sm transition-all hover:-translate-y-0.5 active:scale-95">
              Bhubaneswar
            </button>
            <button
              type="button"
              class="suggestion-btn text-xs bg-white/60 hover:bg-indigo-50 text-indigo-700 font-semibold py-1.5 px-3 rounded-full border border-indigo-100 shadow-sm transition-all hover:-translate-y-0.5 active:scale-95">
              London
            </button>
            <button
              type="button"
              class="suggestion-btn text-xs bg-white/60 hover:bg-indigo-50 text-indigo-700 font-semibold py-1.5 px-3 rounded-full border border-indigo-100 shadow-sm transition-all hover:-translate-y-0.5 active:scale-95">
              Tokyo
            </button>
            <button
              type="button"
              class="suggestion-btn text-xs bg-white/60 hover:bg-indigo-50 text-indigo-700 font-semibold py-1.5 px-3 rounded-full border border-indigo-100 shadow-sm transition-all hover:-translate-y-0.5 active:scale-95">
              New York
            </button>
          </div>

          <div
            id="Error"
            class="hidden bg-red-50 text-red-600 text-sm mt-5 p-3 rounded-lg text-center font-semibold border border-red-100 flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
              <path
                fill-rule="evenodd"
                d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                clip-rule="evenodd"></path>
            </svg>
            <p>City not found. Please try again.</p>
          </div>
        </form>
      </div>

      <div
        id="card"
        class="hidden w-full max-w-sm mx-auto bg-white/80 backdrop-blur-xl p-8 rounded-[2rem] shadow-[0_8px_30px_rgb(0,0,0,0.12)] border border-white/50 transition-all duration-500 transform hover:scale-[1.02]">
        <div class="flex flex-col items-center">
          <h1
            class="flex items-center text-3xl font-bold text-gray-900 tracking-tight mb-1 text-center drop-shadow-sm">
            <svg
              class="w-6 h-6 mr-2 text-indigo-500 shrink-0"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              viewBox="0 0 24 24"
              aria-hidden="true">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
            <span id="cityName" class="truncate">City Name</span>
          </h1>

          <p
            id="weatherDesc"
            class="text-xs text-indigo-600 font-bold uppercase tracking-[0.2em] text-center mt-2 bg-indigo-50 px-3 py-1 rounded-full">
            Weather Description
          </p>

          <div
            id="tempInfo"
            class="flex items-center justify-center mt-8 mb-4 gap-4">
            <img
              id="weatherIcon"
              src=""
              alt="Weather icon"
              class="w-28 h-28 drop-shadow-xl filter saturate-150" />
            <div class="flex items-start drop-shadow-sm">
              <span
                id="temperature"
                class="text-7xl font-black text-gray-900 tracking-tighter"
                >--</span
              >
              <span class="text-4xl font-bold text-gray-400 mt-2 ml-1">°C</span>
            </div>
          </div>

          <div
            class="grid grid-cols-2 gap-4 mt-8 pt-6 border-t border-gray-200/60 w-full text-gray-600">
            <div
              class="flex flex-col items-center bg-white/50 w-full py-3 rounded-2xl shadow-sm">
              <svg
                class="w-5 h-5 text-blue-500 mb-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
              </svg>
              <span id="humidity" class="text-xl font-black text-gray-800"
                >--%</span
              >
              <span
                class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mt-1"
                >Humidity</span
              >
            </div>
            <div
              class="flex flex-col items-center bg-white/50 w-full py-3 rounded-2xl shadow-sm">
              <svg
                class="w-5 h-5 text-teal-500 mb-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
              </svg>
              <span id="windSpeed" class="text-xl font-black text-gray-800"
                >--</span
              >
              <span
                class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mt-1"
                >Wind (km/h)</span
              >
            </div>
            <div
              class="flex flex-col items-center bg-white/50 w-full py-3 rounded-2xl shadow-sm">
              <svg
                class="w-5 h-5 text-orange-500 mb-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
              </svg>
              <span id="feelsLike" class="text-xl font-black text-gray-800"
                >--°C</span
              >
              <span
                class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mt-1"
                >Feels Like</span
              >
            </div>
            <div
              class="flex flex-col items-center bg-white/50 w-full py-3 rounded-2xl shadow-sm">
              <svg
                class="w-5 h-5 text-yellow-500 mb-1"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
              </svg>
              <span id="sunrise" class="text-xl font-black text-gray-800"
                >--:--</span
              >
              <span
                class="text-[10px] font-bold uppercase tracking-wider text-gray-500 mt-1"
                >Sunrise</span
              >
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
